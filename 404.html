<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Iconic Lab</title>
  <meta name="theme-color" content="#05080f" />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* Self-contained so it renders correctly no matter which path GitHub Pages
       serves it from (project subpath, custom domain, or local preview). */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#05080f;--text:#eaf0fb;--muted:#97a3bd}
    body{min-height:100vh;display:grid;place-items:center;text-align:center;padding:40px;
      background:var(--bg);color:var(--text);overflow:hidden;
      font-family:"Pretendard Variable",Pretendard,"Sora",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    .blob{position:fixed;border-radius:50%;filter:blur(90px);z-index:-1;opacity:.5}
    .b1{width:520px;height:520px;top:-160px;left:-120px;background:radial-gradient(circle,#22d3ee,transparent 60%)}
    .b2{width:480px;height:480px;bottom:-160px;right:-120px;background:radial-gradient(circle,#6366f1,transparent 62%)}
    .code{font-family:"Sora",system-ui,sans-serif;font-weight:800;line-height:1;letter-spacing:-.04em;
      font-size:clamp(5rem,24vw,13rem);
      background:linear-gradient(135deg,#22d3ee,#38bdf8 45%,#6366f1);
      -webkit-background-clip:text;background-clip:text;color:transparent}
    p{color:var(--muted);margin:14px 0 32px;font-size:1.1rem}
    .home{display:inline-flex;align-items:center;gap:9px;padding:13px 24px;border-radius:999px;
      font-weight:600;text-decoration:none;color:#04121e;
      background:linear-gradient(135deg,#22d3ee,#38bdf8 45%,#6366f1);
      box-shadow:0 12px 34px -14px rgba(56,189,248,.75);transition:transform .2s ease}
    .home:hover{transform:translateY(-2px)}
    .home svg{width:18px}
    .home:focus-visible{outline:2px solid #22d3ee;outline-offset:3px}
  </style>
</head>
<body>
  <span class="blob b1" aria-hidden="true"></span>
  <span class="blob b2" aria-hidden="true"></span>
  <div>
    <div class="code">404</div>
    <p>페이지를 찾을 수 없어요. · Page not found.</p>
    <a class="home" id="home" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Iconic Lab
    </a>
  </div>
  <script>
    /* Point "home" at the site root regardless of how deep the missing URL was. */
    (function () {
      var seg = location.pathname.split("/").filter(Boolean);
      // GitHub project page: /<repo>/...  -> home = /<repo>/ ; otherwise origin root
      var home = (location.hostname.endsWith("github.io") && seg.length)
        ? "/" + seg[0] + "/"
        : "/";
      document.getElementById("home").setAttribute("href", home);
    })();
  </script>
</body>
</html>
